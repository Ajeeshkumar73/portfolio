services:
  # Backend Web Service
  - type: web
    name: portfolio-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  # Frontend Static Site
  - type: web
    name: portfolio-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm run build"
    publishPath: "build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: portfolio-backend
          property: url
